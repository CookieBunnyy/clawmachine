<!DOCTYPE html>
<html>
<head>
   <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<meta charset="UTF-8">
<title>Claw Machine Questions</title>

<style>
@font-face{
font-family: "Kieda";
src: url("https://cookiebunnyy.github.io/repository/fonts/kieda.otf") format("opentype");

font-family: "ectros";
src: url("https://cookiebunnyy.github.io/repository/fonts/ectros.otf") format("opentype");

font-family: "Lighthouse";
src: url("https://cookiebunnyy.github.io/repository/fonts/Lighthouse_PersonalUse.ttf") format("trueType");

font-family: "Cath";
src: url("https://cookiebunnyy.github.io/repository/fonts/Catherine de Beaumont.ttf") format("trueType");

font-family: "louisa";
src: url("https://cookiebunnyy.github.io/repository/fonts/LouisaCP.otf") format("opentype");
}

body{
margin:0;
font-family:Arial;
background:
repeating-linear-gradient(
90deg,#eb58e3,#eb58e3 80px,
#ff80f4 80px,#ff80f4 160px);
text-align:center;
overflow:hidden;
}

/* MACHINE */
#machine{
width:800px;
height:620px;
margin:40px auto;
padding:15px;
border-radius:15px;

}

#playArea{
width:90%;
height:100%;
background:linear-gradient(#8b018b,#b635af);
border:20px dotted rgb(255, 255, 255);
border-radius:10px;
position:relative;
overflow:hidden;
}

/* ROPE */
#rope{
position:absolute;
width:10px;
background:#333;
top:0;
height:40px;
}

/* CLAW */
#claw{
position:absolute;
width:120px;
margin-left: -20px;
top:40px;
}

#claw img{
width:170px;
}

.prize{
width:95px;
height:95px;
position:absolute;
display:flex;
justify-content:center;
align-items:center;
}

.prize img{
width:98px;
height:98px;
object-fit:contain;
pointer-events:none;
}

/* QUESTION BOX */
#questionBox{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:25px;
border-radius:10px;
display:none;
z-index:10;
width:320px;
border: #fc56ee 7px solid;
}

button{
padding:20px 30px;
margin-top:15px;
background:#ee2aee;
border: none;
border-radius: 10%;
color:rgb(255, 255, 255);
cursor:pointer;
font-size:19px;
}
h2{
color:#ffffff;
font-size: 47px;
font-family:"ectros", Arial, sans-serif;
background-color:#f047e2;
width:30%;
margin-left:34%;
border-radius: 20px;
height: 65px;
border: #ffffff 15px dotted;

}

</style>
</head>

<body>

<h2>The Mystery Claw Machine</h2>

<div id="machine">
<div id="playArea">

<div id="rope"></div>

<div id="claw">
<img src="https://cdn-icons-png.flaticon.com/512/4244/4244713.png">
</div>

</div>
</div>

<div id="questionBox">
<h3 id="questionText"></h3>
<button onclick="doneQuestion()">DONE</button>
</div>

<script>

/* =====================
   GAME STATE
=====================*/
const claw=document.getElementById("claw");
const rope=document.getElementById("rope");
const playArea=document.getElementById("playArea");

let clawX=290;
let clawY=40;

let moveLeft=false;
let moveRight=false;

let grabbing=false;
let questionActive=false;
let grabbedPrize=null;

/* =====================
   QUESTIONS (OPEN)
=====================*/
const questions=[
"Trees give us oxygen.",
"People should not throw trash in rivers.",
"Plastic waste harms sea animals.",
"Protecting the environment is important.",
"Recycling is a good habit."
];

let qIndex=0;

/* =====================
   SPAWN PRIZES (ON FLOOR)
=====================*/
const colors=["red","blue","green","orange","purple"];

function spawnPrize(){

let p=document.createElement("div");
p.className="prize";

/* RANDOM POSITION */
p.style.left=Math.random()*600+"px";

/* FLOOR */
p.style.top="500px";

/* RANDOM GIFT IMAGE */
let giftNumber=Math.floor(Math.random()*5)+1;

p.innerHTML=`<img src="gift${giftNumber}.svg">`;

playArea.appendChild(p);
}

for(let i=0;i<30;i++) spawnPrize();

/* =====================
   GAME LOOP
=====================*/
function gameLoop(){

if(!grabbing && !questionActive){

if(moveLeft) clawX-=4;
if(moveRight) clawX+=4;

clawX=Math.max(0,Math.min(580,clawX));
}

updateClaw();
requestAnimationFrame(gameLoop);
}
requestAnimationFrame(gameLoop);

/* =====================
   UPDATE
=====================*/
function updateClaw(){

claw.style.left=clawX+"px";
claw.style.top=clawY+"px";

rope.style.left=(clawX+60)+"px";
rope.style.height=clawY+"px";

if(grabbedPrize){
grabbedPrize.style.left=(clawX+30)+"px";
grabbedPrize.style.top=(clawY+80)+"px";
}

}

/* =====================
   CONTROLS
=====================*/
document.addEventListener("keydown",e=>{

if(questionActive) return;

if(e.key==="ArrowLeft") moveLeft=true;
if(e.key==="ArrowRight") moveRight=true;

if(e.key==="ArrowDown" && !grabbing)
dropClaw();
});

document.addEventListener("keyup",e=>{
if(e.key==="ArrowLeft") moveLeft=false;
if(e.key==="ArrowRight") moveRight=false;
});

/* =====================
   DROP
=====================*/
function dropClaw(){

grabbing=true;

let down=setInterval(()=>{

clawY+=5;

if(clawY>=450){
clearInterval(down);
checkGrab();
liftClaw();
}

},16);
}

/* =====================
   GRAB
=====================*/
function checkGrab(){

let prizes=document.querySelectorAll(".prize");

prizes.forEach(p=>{

if(grabbedPrize) return;

let prizeCenter=p.offsetLeft+30;
let clawCenter=clawX+60;

if(Math.abs(prizeCenter-clawCenter)<55){

grabbedPrize=p;
questionActive=true;

showQuestion();
spawnPrize();
}

});
}

/* =====================
   LIFT
=====================*/
function liftClaw(){

let up=setInterval(()=>{

clawY-=5;

if(clawY<=40){

clearInterval(up);

if(grabbedPrize){
grabbedPrize.remove();
grabbedPrize=null;
}

grabbing=false;
}

},16);
}

/* =====================
   QUESTION DISPLAY
=====================*/
function showQuestion(){

document.getElementById("questionText")
.innerText=questions[qIndex % questions.length];

document.getElementById("questionBox")
.style.display="block";
}

function doneQuestion(){

document.getElementById("questionBox")
.style.display="none";

questionActive=false;
qIndex++;

/* 🎉 CONFETTI EFFECT */
confetti({
particleCount:150,
spread:80,
origin:{ y:0.6 }
});

}

</script>

</body>
</html>
